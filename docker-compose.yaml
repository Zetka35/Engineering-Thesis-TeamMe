
version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: teamme-pg
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: zetka
      POSTGRES_DB: teamme
    ports:
      - "5433:5432"
    volumes:
      - teamme_pgdata:/var/lib/postgresql/data
volumes:
  teamme_pgdata:
