version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: teamme-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: teamme
    expose:
      - "5432"
    volumes:
      - teamme_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d teamme"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend/backend
      dockerfile: Dockerfile
    container_name: teamme-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_ISSUER: ${APP_JWT_ISSUER}
      APP_JWT_ACCESS_TOKEN_MINUTES: ${APP_JWT_ACCESS_TOKEN_MINUTES}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE}
    expose:
      - "8080"

  frontend:
    build:
      context: ./teamme_frontend
      dockerfile: Dockerfile
    container_name: teamme-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL:
    expose:
      - "5173"
    volumes:
      - ./teamme_frontend/src:/app/src
      - ./teamme_frontend/public:/app/public
      - ./teamme_frontend/index.html:/app/index.html
      - ./teamme_frontend/vite.config.ts:/app/vite.config.ts
      - ./teamme_frontend/tsconfig.json:/app/tsconfig.json
      - ./teamme_frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./teamme_frontend/tsconfig.node.json:/app/tsconfig.node.json

  proxy:
    image: nginx:1.27-alpine
    container_name: teamme-proxy
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

volumes:
  teamme_pgdata: