spring:
  flyway:
    enabled: false

  datasource:
    url: jdbc:h2:mem:teamme_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: ""

  jpa:
